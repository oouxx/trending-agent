<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股市场 AI 分析报告</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .container { background: #fff; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        h2 { color: #555; margin-top: 30px; border-left: 4px solid #007bff; padding-left: 10px; }
        h3 { color: #666; }
        h4 { color: #777; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #007bff; color: #fff; }
        tr:nth-child(even) { background: #f9f9f9; }
        .info { color: #666; font-size: 14px; margin-bottom: 20px; }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; color: #999; font-size: 14px; }
        ul, ol { margin: 10px 0; padding-left: 25px; }
        li { margin: 5px 0; }
        blockquote { border-left: 4px solid #ddd; margin: 15px 0; padding: 10px 15px; color: #666; background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 A股市场 AI 分析报告</h1>
        <p class="info">生成时间：{{ date }}</p>

        {{ overview | safe }}

        {{ board_distribution | safe }}

        {{ limit_up_table | safe }}

        {{ plate_abnormal | safe }}

        {{ field_items | safe }}

        {{ timeline | safe }}

        {{ analyses | safe }}

        <div class="footer">
            <p>⚠️ AI 生成内容，仅供参考，不构成投资建议</p>
        </div>
    </div>
</body>
</html>
